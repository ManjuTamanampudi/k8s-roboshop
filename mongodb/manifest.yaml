apiVersion: apps/v1
kind: Deployment
metadata: 
 name: mongodb
 namespace: roboshop
 labels:
   app: roboshop
   environment: dev
   tier: db
   component: mongodb
 spec:
  replicas: 1
  selector:
    matchLabels:
      app: roboshop
      environment: dev
      tier: db
      component: mongodb  
  template:
    metadata:
      labels:
        app: roboshop
        environment: dev
        tier: db
        component: mongodb
    spec:
     containers:
      - name: mongodb
        image: manjukarri/mongodb:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    app: roboshop
    environment: dev
    tier: db
    component: mongodb 
spec:
  type: ClusterIP
  selector:
    app: roboshop
    environment: dev
    tier: db
    component: mongodb 
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017           
