
apiVersion: v1
kind: ConfigMap
metadata:
 name: frontend
 namespace: roboshop
 labels:
   app: roboshop
   environment: dev
   tier: frontend
   component: frontend
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;
    pid /run/nginx.pid;

    include /usr/share/nginx/modules/*.conf;

    events {
        worker_connections 1024;
     }

    http {
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

        access_log  /var/log/nginx/access.log  main;

        sendfile            on;
        tcp_nopush          on;
        keepalive_timeout   65;
        types_hash_max_size 4096;

        include             /etc/nginx/mime.types;
        default_type        application/octet-stream;

        include /etc/nginx/conf.d/*.conf;

        server {
            listen       80;
            listen       [::]:80;
            server_name  _;
            root         /usr/share/nginx/html;

            include /etc/nginx/default.d/*.conf;

            error_page 404 /404.html;
            location = /404.html {
            }

            error_page 500 502 503 504 /50x.html;
            location = /50x.html {
            }

            location /images/ {
              expires 5s;
              root   /usr/share/nginx/html;
              try_files $uri /images/placeholder.jpg;
            }
            location /api/catalogue/ { proxy_pass http://catalogue:8080/; }
            location /api/user/ { proxy_pass http://user:8080/; }
            location /api/cart/ { proxy_pass http://cart:8080/; }
            location /api/shipping/ { proxy_pass http://shipping:8080/; }
            location /api/payment/ { proxy_pass http://payment:8080/; }

            location /health {
              stub_status on;
              access_log off;
            }

        }
    }

    
---
apiVersion: apps/v1
kind: Deployment
metadata: 
 name: frontend
 namespace: roboshop
 labels:
   app: roboshop
   environment: dev
   tier: frontend
   component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roboshop
      environment: dev
      tier: frontend
      component: frontend  
  template:
    metadata:
      labels:
        app: roboshop
        environment: dev
        tier: frontend
        component: frontend
    spec:
     volumes:
      - name: config-volume
        configMap:
          name: nginx-config
     containers:
      - name: frontend
        image: manjukarri/frontend:1.0.0
        imagePullPolicy: Always
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          tcpSocket:
            port: 80
          periodSeconds: 10
          initialDelaySeconds: 15
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /
            port: 80         
          periodSeconds: 10
          failureThreshold: 2
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
---
apiVersion: v1
kind: Service
type: LoadBalancer
metadata:
  name: frontend
  namespace: roboshop
  labels:
    app: roboshop
    environment: dev
    tier: frontend
    component: frontend 
spec:
  type: ClusterIP
  selector:
    app: roboshop
    environment: dev
    tier: frontend
    component: frontend 
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080           
