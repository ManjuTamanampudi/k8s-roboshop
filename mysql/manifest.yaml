apiVersion: v1
kind: Deployment
metadata: 
 name: mysql
 namespace: roboshop
 labels:
   app: roboshop
   environment: dev
   tier: db
   component: mysql
 spec:
  replicas: 1
  selector:
    matchlabels:
      app: roboshop
      environment: dev
      tier: db
      component: mysql  
  template:
    metadata:
      labels:
        app: roboshop
        environment: dev
        tier: db
        component: mysql
    spec:
     container:
      - name: mysql
        image: manjukarri/mysql:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    app: roboshop
    environment: dev
    tier: db
    component: mysql 
spec:
  type: ClusterIP
  selector:
    app: roboshop
    environment: dev
    tier: db
    component: mysql 
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306           
