apiVersion: app/v1
kind: Deployment
metadata: 
 name: redis
 namespace: roboshop
 labels:
   app: roboshop
   environment: dev
   tier: db
   component: redis
 spec:
  replicas: 1
  selector:
    matchlabels:
      app: roboshop
      environment: dev
      tier: db
      component: redis  
  template:
    metadata:
      labels:
        app: roboshop
        environment: dev
        tier: db
        component: redis
    spec:
     container:
      - name: redis
        image: redis:7.0
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    app: roboshop
    environment: dev
    tier: db
    component: redis 
spec:
  type: ClusterIP
  selector:
    app: roboshop
    environment: dev
    tier: db
    component: redis 
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379           
