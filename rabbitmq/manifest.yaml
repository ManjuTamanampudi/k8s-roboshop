apiVersion: v1
kind: Deployment
metadata: 
 name: rabbitmq
 namespace: roboshop
 labels:
   app: roboshop
   environment: dev
   tier: db
   component: rabbitmq
 spec:
  replicas: 1
  selector:
    matchlabels:
      app: roboshop
      environment: dev
      tier: db
      component: rabbitmq  
  template:
    metadata:
      labels:
        app: roboshop
        environment: dev
        tier: db
        component: rabbitmq
    spec:
     container:
      - name: rabbitmq
        image: rabbitmq:3
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    app: roboshop
    environment: dev
    tier: db
    component: rabbitmq 
spec:
  type: ClusterIP
  selector:
    app: roboshop
    environment: dev
    tier: db
    component: rabbitmq 
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672           
