apiVersion: v1
kind: ConfigMap
metadata:
 name: payment
 namespace: roboshop
 labels:
   app: roboshop
   environment: dev
   tier: backend
   component: payment
data:
  CART_HOST: "cart"
  CART_PORT: 8080
  USER_HOST: "user"
  USER_PORT: 8080
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"

---
apiVersion: apps/v1
kind: Deployment
metadata: 
 name: payment
 namespace: roboshop
 labels:
   app: roboshop
   environment: dev
   tier: backend
   component: payment
 spec:
  replicas: 1
  selector:
    matchLabels:
      app: roboshop
      environment: dev
      tier: backend
      component: payment  
  template:
    metadata:
      labels:
        app: roboshop
        environment: dev
        tier: backend
        component: payment
    spec:
     containers:
      - name: payment
        image: manjukarri/payment:1.0.0
        imagePullPolicy: Always
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          tcpSocket:
            port: 8080
          periodSeconds: 10
          initialDelaySeconds: 15
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /health
            port: 8080          
          periodSeconds: 10
          failureThreshold: 2
        envFrom:
          - configMapRef:
              name: payment
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
    app: roboshop
    environment: dev
    tier: backend
    component: payment 
spec:
  type: ClusterIP
  selector:
    app: roboshop
    environment: dev
    tier: backend
    component: payment 
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080           
